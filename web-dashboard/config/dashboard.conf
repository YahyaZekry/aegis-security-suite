# Garuda Security Suite Web Dashboard Configuration
# This file contains configuration settings for the web dashboard

[dashboard]
# Dashboard basic settings
title = Garuda Security Suite
version = 1.0.0
debug = false
host = 0.0.0.0
port = 8080
secret_key = dd11187ae39fa5175ea26276b0a0de17cddd864efdbffeb43636c9d4926560ac

[security]
# Security settings
enable_auth = true
session_timeout = 3600
max_login_attempts = 5
lockout_duration = 900
require_https = false
enable_csrf = true

[database]
# Database settings
database_path = ${SECURITY_SUITE_HOME}/configs/web-dashboard/dashboard.db
backup_enabled = true
backup_interval = 24
backup_retention_days = 7

[logging]
# Logging settings
log_level = INFO
log_file = ${SECURITY_SUITE_HOME}/logs/web-dashboard.log
log_max_size = 10MB
log_backup_count = 5
enable_access_log = true

[monitoring]
# Real-time monitoring settings
enable_websockets = true
monitoring_interval = 5
max_connections = 100
heartbeat_interval = 30

[alerts]
# Alert settings
enable_notifications = true
notification_email = admin@example.com
alert_threshold_cpu = 80
alert_threshold_memory = 85
alert_threshold_disk = 90
alert_cooldown = 300

[api]
# API settings
rate_limit_enabled = true
rate_limit_requests = 100
rate_limit_window = 60
api_timeout = 30
enable_api_docs = true

[ui]
# User interface settings
default_theme = light
enable_theme_switcher = true
items_per_page = 25
refresh_interval = 30
enable_animations = true

[integration]
# Integration with existing security suite
behavioral_analysis_enabled = true
threat_intelligence_enabled = true
incident_response_enabled = true
security_scanner_enabled = true

[behavioral_analysis]
# Behavioral analysis integration
database_path = ${SECURITY_SUITE_HOME}/configs/behavioral_analysis/behavioral_analysis.db
monitoring_script = ${SECURITY_SUITE_HOME}/scripts/behavioral-monitor.sh
analysis_script = ${SECURITY_SUITE_HOME}/scripts/behavioral-analysis.sh
default_time_range = 24h
anomaly_threshold = 0.7

[threat_intelligence]
# Threat intelligence integration
database_path = ${SECURITY_SUITE_HOME}/configs/threat_intelligence/ioc_database.db
update_script = ${SECURITY_SUITE_HOME}/scripts/threat-intelligence-v2.sh
auto_update_enabled = true
update_interval_hours = 6
max_iocs_display = 1000

[incident_response]
# Incident response integration
database_path = ${SECURITY_SUITE_HOME}/configs/incident_response/incidents.db
response_script = ${SECURITY_SUITE_HOME}/scripts/incident-response.sh
evidence_path = ${SECURITY_SUITE_HOME}/evidence
auto_evidence_collection = true
max_incident_age_days = 90

[security_scanner]
# Security scanner integration
scanner_script = ${SECURITY_SUITE_HOME}/scripts/security-daily-scan.sh
clamav_enabled = true
rkhunter_enabled = true
scan_interval_hours = 24
quarantine_path = ${SECURITY_SUITE_HOME}/quarantine

[reports]
# Report generation settings
reports_path = ${SECURITY_SUITE_HOME}/reports
auto_generate_reports = true
report_schedule = daily
report_retention_days = 30
export_formats = json,csv,pdf

[performance]
# Performance optimization settings
enable_caching = true
cache_timeout = 300
compress_responses = true
max_upload_size = 10MB
connection_pool_size = 10

[development]
# Development settings (only used when debug = true)
auto_reload = true
show_sql_queries = false
profiling_enabled = false
test_data_enabled = false