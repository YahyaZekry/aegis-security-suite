# Security Suite Configuration
# Generated for testing modular scanner architecture

# Dynamic path configuration - will be overridden by environment variable
if [ -z "${SECURITY_SUITE_HOME:-}" ]; then
    SECURITY_SUITE_HOME="$HOME/security-suite"
fi
SCRIPTS_DIR="$SECURITY_SUITE_HOME/scripts"
LOGS_DIR="$SECURITY_SUITE_HOME/logs"
CONFIGS_DIR="$SECURITY_SUITE_HOME/configs"
BACKUPS_DIR="$SECURITY_SUITE_HOME/backups"
EVIDENCE_DIR="$SECURITY_SUITE_HOME/evidence"
QUARANTINE_DIR="$SECURITY_SUITE_HOME/quarantine"
CURRENT_USER="$(whoami)"
CURRENT_HOME="$HOME"

# Database paths
BEHAVIORAL_DB_DIR="$CONFIGS_DIR/behavioral_analysis"
INCIDENT_DB_DIR="$CONFIGS_DIR/incident_response"
THREAT_DB_DIR="$CONFIGS_DIR/threat_intelligence"
BEHAVIORAL_DATABASE="$BEHAVIORAL_DB_DIR/behavioral_data.db"
INCIDENT_DATABASE="$INCIDENT_DB_DIR/incidents.db"
IOC_DATABASE="$THREAT_DB_DIR/ioc_database.db"

# Notification settings
NOTIFICATIONS_ENABLED=true
NOTIFICATION_URGENCY="normal"

# Scanning preferences
UPDATE_BEFORE_SCAN=true
REAL_TIME_FEEDBACK=false

# Security tools selection
SELECTED_SECURITY_TOOLS=("clamav" "rkhunter")

# Behavioral Analysis Configuration
BEHAVIORAL_ANALYSIS_ENABLED=true
BEHAVIORAL_LEARNING_PERIOD=7
BEHAVIORAL_MONITORING_INTERVAL=60
BEHAVIORAL_SENSITIVITY_LEVEL="medium"
BEHAVIORAL_THREAT_SCORE_THRESHOLD=70
BEHAVIORAL_MAX_BASELINE_AGE=30
BEHAVIORAL_PROCESS_WHITELIST=""
BEHAVIORAL_PROCESS_BLACKLIST=""
BEHAVIORAL_NETWORK_WHITELIST=""
BEHAVIORAL_NETWORK_BLACKLIST=""

# Scan directories
DAILY_SCAN_DIRS=("$HOME/Documents" "$HOME/Downloads" "$HOME/Desktop")
WEEKLY_SCAN_DIRS=("$HOME")
MONTHLY_SCAN_DIRS=("$HOME" "/tmp" "/var/tmp")

# Schedule settings
DAILY_TIME="02:00"
WEEKLY_DAY="Sun"
WEEKLY_TIME="03:00"
MONTHLY_DAY="1"
MONTHLY_TIME="04:00"
# Optimized Configuration Settings
# Added by optimized components installer

# Memory Management
MEMORY_MONITOR_ENABLED=true
MEMORY_THRESHOLD_WARNING=85
MEMORY_THRESHOLD_CRITICAL=95
PROCESS_MEMORY_LIMIT=2000

# Behavioral Analysis Optimization
BEHAVIORAL_ANALYSIS_OPTIMIZED=true
MAX_PROCESSES_TO_MONITOR=30
MAX_NETWORK_CONNECTIONS=100
MAX_FILE_ACCESSES=200

# Threat Intelligence Optimization
THREAT_INTELLIGENCE_OPTIMIZED=true
MAX_FEED_SIZE_MB=50
MAX_MEMORY_USAGE_MB=200
MAX_CONCURRENT_DOWNLOADS=3

# Database Optimization
DATABASE_CONNECTION_POOLING=true
MAX_DB_CONNECTIONS=5
QUERY_TIMEOUT=10
MAX_DB_SIZE_MB=500

# Web Dashboard Optimization
DASHBOARD_OPTIMIZED=true
MAX_CONCURRENT_CONNECTIONS=50
CONNECTION_TIMEOUT=300
WEBSOCKET_PING_INTERVAL=25
WEBSOCKET_PING_TIMEOUT=30

